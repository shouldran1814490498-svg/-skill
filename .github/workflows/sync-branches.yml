name: Sync skill branches

on:
  push:
    branches: [main]

jobs:
  detect-and-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Get changed files
        id: changes
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
          echo "files=$CHANGED" >> $GITHUB_OUTPUT
          echo "Changed files: $CHANGED"

      - name: Sync strategy branch
        if: contains(steps.changes.outputs.files, '外投策略生成skill/')
        run: |
          git checkout skill/strategy 2>/dev/null || git checkout -b skill/strategy
          git checkout main -- "外投策略生成skill/"
          git add -A
          git diff --cached --quiet || (git commit -m "sync: update strategy from main" && git push origin skill/strategy)
          git checkout main

      - name: Sync kol-screen branch
        if: contains(steps.changes.outputs.files, '外投达人筛选skill/')
        run: |
          git checkout skill/kol-screen 2>/dev/null || git checkout -b skill/kol-screen
          git checkout main -- "外投达人筛选skill/"
          git add -A
          git diff --cached --quiet || (git commit -m "sync: update kol-screen from main" && git push origin skill/kol-screen)
          git checkout main

      - name: Sync xhs branch
        if: contains(steps.changes.outputs.files, '外投小红书内容生成')
        run: |
          git checkout skill/xhs 2>/dev/null || git checkout -b skill/xhs
          git checkout main -- "外投小红书内容生成&审核skill/"
          git add -A
          git diff --cached --quiet || (git commit -m "sync: update xhs from main" && git push origin skill/xhs)
          git checkout main

      - name: Sync quote branch
        if: contains(steps.changes.outputs.files, '外投比价skill/')
        run: |
          git checkout skill/quote 2>/dev/null || git checkout -b skill/quote
          git checkout main -- "外投比价skill/"
          git add -A
          git diff --cached --quiet || (git commit -m "sync: update quote from main" && git push origin skill/quote)
          git checkout main

      - name: Sync pipeline branch
        if: contains(steps.changes.outputs.files, 'pipeline/')
        run: |
          git checkout skill/pipeline 2>/dev/null || git checkout -b skill/pipeline
          git checkout main -- "pipeline/"
          git add -A
          git diff --cached --quiet || (git commit -m "sync: update pipeline from main" && git push origin skill/pipeline)
          git checkout main
